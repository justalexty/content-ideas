<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Bible — MIDAO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text: #e8e8e8;
      --text-secondary: rgba(255,255,255,0.5);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --near: #10b981;
      --mid: #f59e0b;
      --long: #ef4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 3rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .header .flag {
      font-size: 1.25rem;
    }
    .header p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* Toolbar */
    .toolbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .filter-group label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-right: 0.25rem;
    }
    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface);
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .count {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    /* Grid */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    /* Card */
    .card {
      background: var(--bg);
      padding: 1.5rem;
      transition: background 0.2s ease;
    }
    .card:hover {
      background: var(--surface);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .card p {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Badges */
    .badge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .badge-near { background: rgba(16,185,129,0.12); color: #34d399; }
    .badge-mid { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .badge-long { background: rgba(239,68,68,0.12); color: #f87171; }
    .badge-medium {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    /* Empty */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      background: var(--bg);
    }
    .empty.hidden { display: none; }

    /* Search */
    .search-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .search-input:focus { border-color: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .header { padding: 2rem 1.25rem 1.5rem; }
      .toolbar { padding: 1rem 1.25rem; gap: 1rem; }
      .grid { padding: 0 0 3rem; grid-template-columns: 1fr; }
      .card { padding: 1.25rem; }
      .count { margin-left: 0; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <h1>Content Bible</h1>
      <span class="flag">🇲🇭</span>
    </div>
    <p>Strategy · Ideas · Pipeline</p>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <label>Timeline</label>
      <button class="filter-btn active" data-filter="timeline" data-value="all">All</button>
      <button class="filter-btn" data-filter="timeline" data-value="Near Term">Near</button>
      <button class="filter-btn" data-filter="timeline" data-value="Mid Term">Mid</button>
      <button class="filter-btn" data-filter="timeline" data-value="Long Term">Long</button>
    </div>
    <div class="divider"></div>
    <div class="filter-group" id="medium-filters">
      <label>Medium</label>
      <button class="filter-btn active" data-filter="medium" data-value="all">All</button>
    </div>
    <div class="divider"></div>
    <input type="text" class="search-input" id="search" placeholder="Search…">
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="cards"></div>

  <script>
    let ideas = [];
    let activeTimeline = 'all';
    let activeMedium = 'all';
    let searchQuery = '';

    const tlBadge = { 'Near Term': 'badge-near', 'Mid Term': 'badge-mid', 'Long Term': 'badge-long' };

    function render() {
      const filtered = ideas.filter(i => {
        if (activeTimeline !== 'all' && i.timeline !== activeTimeline) return false;
        if (activeMedium !== 'all' && i.medium !== activeMedium) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return i.title.toLowerCase().includes(q) || i.description.toLowerCase().includes(q) ||
            (i.tags || []).some(t => t.toLowerCase().includes(q));
        }
        return true;
      });

      document.getElementById('count').textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');
      const container = document.getElementById('cards');

      if (!filtered.length) {
        container.innerHTML = '<div class="empty">No items match these filters.</div>';
        return;
      }

      container.innerHTML = filtered.map(i => {
        const cls = tlBadge[i.timeline] || 'badge-near';
        const desc = i.description.replace(/\n/g, '<br>');
        return `<div class="card">
          <div class="card-header">
            <span class="badge ${cls}">${i.timeline}</span>
            <span class="badge-medium">${i.medium}</span>
          </div>
          <h3>${i.title}</h3>
          <p>${desc}</p>
        </div>`;
      }).join('');
    }

    function buildMediumFilters() {
      const mediums = [...new Set(ideas.map(i => i.medium))].sort();
      const container = document.getElementById('medium-filters');
      mediums.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = 'medium';
        btn.dataset.value = m;
        btn.textContent = m;
        container.appendChild(btn);
      });
    }

    document.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      const type = btn.dataset.filter, val = btn.dataset.value;
      document.querySelectorAll(`.filter-btn[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (type === 'timeline') activeTimeline = val;
      if (type === 'medium') activeMedium = val;
      render();
    });

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    fetch('data.json').then(r => r.json()).then(data => {
      ideas = data;
      buildMediumFilters();
      render();
    });
  </script>
</body>
</html>
