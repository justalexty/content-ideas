<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Brainstorm</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep: #0b1620;
            --glass: rgba(255,255,255,0.035);
            --glass-border: rgba(255,255,255,0.06);
            --text: rgba(220,216,210,0.75);
            --text-dim: rgba(200,196,190,0.3);
            --accent: rgba(180,172,155,0.5);
        }
        html, body { height: 100%; }
        body {
            background: var(--deep);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            color: var(--text);
        }
        .gate {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 44px 40px;
            width: 340px;
            text-align: center;
        }
        h1 {
            color: var(--text);
            font-family: 'Bodoni Moda', serif;
            font-size: 1.4em;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 0;
        }
        .divider {
            border: none;
            border-top: 1px solid var(--glass-border);
            margin: 24px 0;
        }
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            letter-spacing: 1.5px;
            outline: none;
            margin-bottom: 16px;
        }
        input[type="password"]::placeholder {
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }
        input[type="password"]:focus {
            border-color: rgba(255,255,255,0.12);
        }
        button {
            width: 100%;
            padding: 11px;
            background: rgba(255,255,255,0.045);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 0.7em;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        button:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text);
            border-color: rgba(255,255,255,0.1);
        }
        .error {
            color: rgba(200,120,110,0.6);
            font-size: 0.75em;
            margin-top: 14px;
            display: none;
            letter-spacing: 1px;
        }
        label {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 0.7em;
            font-weight: 300;
            margin-bottom: 16px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        label input { margin-right: 8px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="gate" id="gate">
        <h1>Hello</h1>
        <hr class="divider">
        <form id="form" onsubmit="return checkPw()">
            <input type="password" id="pw" placeholder="Password" autofocus>
            <label><input type="checkbox" id="remember"> Remember Me</label>
            <button type="submit">Enter</button>
        </form>
        <p class="error" id="err">Wrong password</p>
    </div>
    <script>
        const HASH = '28892af7984fb9fa68d46a04c41197e066d18f80af7b78f4d5c3d42b440810b1';
        
        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function checkPw() {
            const pw = document.getElementById('pw').value;
            const hash = await sha256(pw);
            if (hash === HASH) {
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('cb_auth', hash);
                }
                sessionStorage.setItem('cb_auth', hash);
                window.location.href = 'app.html';
            } else {
                document.getElementById('err').style.display = 'block';
                document.getElementById('pw').value = '';
                document.getElementById('pw').focus();
            }
            return false;
        }
        
        // Auto-login if remembered
        (async () => {
            const stored = localStorage.getItem('cb_auth') || sessionStorage.getItem('cb_auth');
            if (stored === HASH) window.location.href = 'app.html';
        })();
    </script>
</body>
</html>
