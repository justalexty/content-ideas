<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Brainstorm</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #0a0a0a;
            font-family: 'Bodoni Moda', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .gate {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px 45px;
            width: 400px;
            text-align: center;
        }
        h1 {
            color: #fff;
            font-size: 1.6em;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .sub {
            color: rgba(255,255,255,0.4);
            font-size: 0.85em;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            font-family: 'Bodoni Moda', serif;
            font-size: 16px;
            letter-spacing: 2px;
            outline: none;
            margin-bottom: 20px;
        }
        input[type="password"]::placeholder {
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }
        input[type="password"]:focus {
            border-color: rgba(255,255,255,0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'Bodoni Moda', serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.35);
        }
        .error {
            color: #ff6b6b;
            font-size: 0.85em;
            margin-top: 15px;
            display: none;
            letter-spacing: 1px;
        }
        label {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.8em;
            margin-bottom: 20px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        label input { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="gate" id="gate">
        <h1>Hello</h1>
        <p class="sub">Enter password to continue</p>
        <hr class="divider">
        <form id="form" onsubmit="return checkPw()">
            <input type="password" id="pw" placeholder="Password" autofocus>
            <label><input type="checkbox" id="remember"> Remember me</label>
            <button type="submit">Enter</button>
        </form>
        <p class="error" id="err">Wrong password</p>
    </div>
    <script>
        const HASH = '28892af7984fb9fa68d46a04c41197e066d18f80af7b78f4d5c3d42b440810b1';
        
        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function checkPw() {
            const pw = document.getElementById('pw').value;
            const hash = await sha256(pw);
            if (hash === HASH) {
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('cb_auth', hash);
                }
                sessionStorage.setItem('cb_auth', hash);
                window.location.href = 'app.html';
            } else {
                document.getElementById('err').style.display = 'block';
                document.getElementById('pw').value = '';
                document.getElementById('pw').focus();
            }
            return false;
        }
        
        // Auto-login if remembered
        (async () => {
            const stored = localStorage.getItem('cb_auth') || sessionStorage.getItem('cb_auth');
            if (stored === HASH) window.location.href = 'app.html';
        })();
    </script>
</body>
</html>
