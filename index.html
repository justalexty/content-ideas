<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Brainstorm</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep: #091a30;
            --lagoon: #1a6b8a;
            --sand: #f4e8c1;
            --gold: #c9a84c;
            --coral: #e8655a;
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.1);
            --text: #f0ece4;
            --text-dim: rgba(240,236,228,0.5);
        }
        html, body { height: 100%; }
        body {
            background: var(--deep);
            background-image: radial-gradient(ellipse at 30% 20%, rgba(26,107,138,0.15) 0%, transparent 50%),
                              radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            color: var(--text);
        }
        .gate {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px 45px;
            width: 400px;
            text-align: center;
        }
        h1 {
            color: var(--sand);
            font-family: 'Bodoni Moda', serif;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .sub {
            color: var(--text-dim);
            font-size: 0.85em;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .divider {
            border: none;
            border-top: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            outline: none;
            margin-bottom: 20px;
        }
        input[type="password"]::placeholder {
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        input[type="password"]:focus {
            border-color: rgba(201,168,76,0.4);
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            color: var(--deep);
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: var(--sand);
        }
        .error {
            color: var(--coral);
            font-size: 0.85em;
            margin-top: 15px;
            display: none;
            letter-spacing: 1px;
        }
        label {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 0.8em;
            font-weight: 300;
            margin-bottom: 20px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        label input { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="gate" id="gate">
        <h1>Hello</h1>
        <hr class="divider">
        <form id="form" onsubmit="return checkPw()">
            <input type="password" id="pw" placeholder="Password" autofocus>
            <label><input type="checkbox" id="remember"> Remember Me</label>
            <button type="submit">Enter</button>
        </form>
        <p class="error" id="err">Wrong password</p>
    </div>
    <script>
        const HASH = '28892af7984fb9fa68d46a04c41197e066d18f80af7b78f4d5c3d42b440810b1';
        
        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function checkPw() {
            const pw = document.getElementById('pw').value;
            const hash = await sha256(pw);
            if (hash === HASH) {
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('cb_auth', hash);
                }
                sessionStorage.setItem('cb_auth', hash);
                window.location.href = 'app.html';
            } else {
                document.getElementById('err').style.display = 'block';
                document.getElementById('pw').value = '';
                document.getElementById('pw').focus();
            }
            return false;
        }
        
        // Auto-login if remembered
        (async () => {
            const stored = localStorage.getItem('cb_auth') || sessionStorage.getItem('cb_auth');
            if (stored === HASH) window.location.href = 'app.html';
        })();
    </script>
</body>
</html>
